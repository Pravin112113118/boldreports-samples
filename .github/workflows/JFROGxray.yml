name: JFrog NuGet Scan

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  scan:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup JFrog CLI
      uses: jfrog/setup-jfrog-cli@v4
      env:
        JF_URL: https://trialyv58p0.jfrog.io/
        JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}

    
    - name: Configure NuGet for JFrog CLI
      run: |
        jfrog nuget-config --repo-resolve sync-nugetdemo 


    - name: Restore NuGet packages
      shell: pwsh
      run: |
            $projects = Get-ChildItem -Recurse -Filter *.csproj
            foreach ($project in $projects) {
              $dir = $project.Directory.FullName
              $projectFile = $project.Name
              Write-Host "--------------------------------"
              Write-Host "Scanning $($project.FullName)"
              Write-Host "--------------------------------"

              Push-Location $dir
              jfrog nuget restore
              Pop-Location
            }

    - name: Publish build info
      run: |
        jfrog rt bce github-nuget-build ${{ github.run_number }}
        jfrog rt bp github-nuget-build ${{ github.run_number }}

    - name: Xray Scan
      run: jfrog rt bs github-nuget-build ${{ github.run_number }} --fail
