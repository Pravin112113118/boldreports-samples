name: Snyk NuGet Security Scan

on:
  push:
    branches: 
      - main
      - master 
  pull_request:
  workflow_dispatch:

jobs:
  snyk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          
      - name: Install Snyk
        run: npm install -g snyk

      
      - name: Run Snyk for all NuGet projects (robust)
        shell: pwsh
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          Write-Host "Searching for .csproj files..."
          $projects = Get-ChildItem -Recurse -Filter *.csproj

          if ($projects.Count -eq 0) {
            Write-Host "No NuGet projects found."
            exit 0
          }

          foreach ($project in $projects) {
            $dir = $project.Directory.FullName
            Write-Host "--------------------------------"
            Write-Host "Scanning $($project.FullName)"
            Write-Host "--------------------------------"

            Push-Location $dir

            # Ensure NuGet context exists
            dotnet restore | Out-Null

            # Explicit NuGet scan
            snyk test --package-manager=nuget --file=$($project.Name) --severity-threshold=high || $true
            snyk monitor --package-manager=nuget --file=$($project.Name) || $true

            Pop-Location
          }

