name: Snyk NuGet Security Scan

on:
  push:
    branches: 
      - main
      - master 
  pull_request:
  workflow_dispatch:

jobs:
  snyk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          
      - name: Install Snyk
        run: npm install -g snyk

      - name: Run Snyk (NuGet)
        run: |
          set -e

          echo "Searching for .csproj and .sln files..."
          mapfile -t projects < <(find . -name "*.csproj" -o -name "*.sln")

          if [ ${#projects[@]} -eq 0 ]; then
            echo "No .NET projects found. Skipping Snyk scan."
            exit 0
          fi

          for project in "${projects[@]}"; do
            project_dir=$(dirname "$project")
            echo "----------------------------------------"
            echo "Running Snyk in $project_dir"
            echo "----------------------------------------"

            cd "$project_dir"
            snyk test --package-manager=nuget --severity-threshold=high || true
            snyk monitor || true
            cd - >/dev/null
          done

